{% extends 'booking/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="card delete-card p-4 fade-up">
        <h3>Ви впевнені, що хочете видалити бронювання: <span class="gold-text">{{ booking.room.name }}</span>?</h3>
        <form method="post" class="mt-3">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger me-2">Видалити</button>
            <a href="{% url 'my_bookings' %}" class="btn btn-secondary">Скасувати</a>
        </form>
    </div>
</div>
{% endblock %}

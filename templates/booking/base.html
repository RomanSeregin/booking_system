<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Система бронювання{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --gold-soft: rgba(212,175,55,.35);
            --dark-bg: #0b0b0f;
            --dark-surface: #141419;
            --text-main: #f5f5f5;
            --text-muted: #b5b5b5;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--text-main);
        }

        /* ================= NAVBAR ================= */

        .navbar {
            background: rgba(15,15,20,0.95) !important;
            border-bottom: 1px solid rgba(212,175,55,.2);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--gold) !important;
        }

        .navbar-brand:hover {
            text-shadow: 0 0 8px var(--gold-soft);
        }

        .nav-link {
            color: var(--text-muted) !important;
            transition: all .3s ease;
        }

        .nav-link:hover {
            color: var(--gold) !important;
            text-shadow: 0 0 6px var(--gold-soft);
        }

        /* ================= CONTENT ================= */

        .content-wrapper {
            background: var(--dark-surface);
            border-radius: 18px;
            padding: 40px;
            border: 1px solid rgba(212,175,55,.15);
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
            animation: fadeUp .6s ease;
            position: relative;
            overflow: hidden;
        }

        /* Золотая линия сверху */
        .content-wrapper::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--gold);
        }

        .content-wrapper:hover {
            box-shadow: 0 0 35px var(--gold-soft);
            transform: translateY(-2px);
            transition: .3s ease;
        }

        /* ================= LINKS ================= */

        a {
            color: var(--gold);
            text-decoration: none;
            transition: .3s ease;
        }

        a:hover {
            text-shadow: 0 0 6px var(--gold-soft);
        }

        /* ================= BUTTONS ================= */

        .btn-primary {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            border-radius: 999px;
            padding: 8px 24px;
            font-weight: 500;
            transition: all .3s ease;
        }

        .btn-primary:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 20px var(--gold-soft);
            transform: translateY(-2px);
        }

        .btn-outline-light {
            border-color: var(--gold);
            color: var(--gold);
        }

        .btn-outline-light:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 15px var(--gold-soft);
        }

        /* ================= ANIMATION ================= */

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">
            🏨 Система бронювання
        </a>

        <ul class="navbar-nav ms-auto align-items-center">
            {% if user.is_authenticated %}
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'booking' %}">Забронювати</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'my_bookings' %}">Мої бронювання</a>
                </li>
                {% if user.is_staff %}
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/">Адмінка</a>
                    </li>
                {% endif %}
                <li class="nav-item ms-3">
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm rounded-pill">
                            Вийти
                        </button>
                    </form>
                </li>
            {% else %}
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'login' %}">Увійти</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'register' %}">Реєстрація</a>
                </li>
            {% endif %}
        </ul>
    </div>
</nav>

<div class="container my-5">
    <div class="content-wrapper">
        {% block content %}{% endblock %}
    </div>
</div>

</body>
</html>
